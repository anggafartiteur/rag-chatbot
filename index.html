<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Chatbot</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: #0f0f13; color: #e2e2e8;
            height: 100vh; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .container {
            width: 100%; max-width: 760px; height: 100vh;
            display: flex; flex-direction: column; padding: 20px;
        }
        .header {
            display: flex; align-items: center; gap: 12px;
            padding: 16px 0 20px; border-bottom: 1px solid #2a2a38;
        }
        .header-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 10px; display: flex; align-items: center;
            justify-content: center; font-size: 20px; flex-shrink: 0;
        }
        .header-text h1 { font-size: 18px; font-weight: 600; color: #f0f0f5; margin: 0; }
        .header-text p  { font-size: 12px; color: #6b6b82; margin: 0; }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #22c55e; box-shadow: 0 0 6px #22c55e88;
            margin-left: auto;
        }
        .messages {
            flex: 1; overflow-y: auto; padding: 20px 0;
            display: flex; flex-direction: column; gap: 16px;
            scrollbar-width: thin; scrollbar-color: #2a2a38 transparent;
        }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb { background: #2a2a38; border-radius: 4px; }
        .message { display: flex; gap: 12px; animation: fadeIn 0.2s ease; }
        .message.user { flex-direction: row-reverse; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .avatar {
            width: 34px; height: 34px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0;
        }
        .message.bot .avatar  { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
        .message.user .avatar { background: #2a2a38; }
        .bubble {
            max-width: 80%; padding: 12px 16px; border-radius: 12px;
            font-size: 14px; line-height: 1.6;
        }
        .message.bot .bubble {
            background: #1a1a24; border: 1px solid #2a2a38;
            border-top-left-radius: 4px; color: #d4d4e0;
        }
        .message.user .bubble {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-top-right-radius: 4px; color: #fff;
        }
        .error-bubble { background: #2a1a1a !important; border-color: #5a2a2a !important; color: #f87171 !important; }
        .typing-dots { display: flex; gap: 5px; align-items: center; }
        .typing-dots span {
            width: 7px; height: 7px; border-radius: 50%; background: #6366f1;
            animation: bounce 1.2s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%,60%,100% { transform: translateY(0); opacity: .5; }
            30% { transform: translateY(-6px); opacity: 1; }
        }
        .welcome { text-align: center; padding: 40px 20px; color: #4a4a62; }
        .welcome h2 { font-size: 22px; color: #6b6b82; }
        .suggestion-btn {
            padding: 8px 14px; background: #1a1a24; border: 1px solid #2a2a38;
            border-radius: 20px; color: #8888a8; font-size: 12px;
            cursor: pointer; transition: all .15s;
        }
        .suggestion-btn:hover { border-color: #6366f1; color: #a5a5d0; background: #1e1e30; }
        .input-area { padding: 16px 0 8px; border-top: 1px solid #2a2a38; }
        .input-wrapper {
            display: flex; align-items: flex-end; gap: 10px;
            background: #1a1a24; border: 1px solid #2a2a38;
            border-radius: 14px; padding: 10px 14px; transition: border-color .2s;
        }
        .input-wrapper:focus-within { border-color: #6366f1; }
        #messageInput {
            flex: 1; background: none; border: none; outline: none;
            color: #e2e2e8; font-size: 14px; font-family: inherit;
            resize: none; max-height: 120px; line-height: 1.5;
        }
        #messageInput::placeholder { color: #4a4a62; }
        #sendBtn {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none; border-radius: 8px; cursor: pointer; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            transition: opacity .2s, transform .1s;
        }
        #sendBtn:hover { opacity: .9; transform: scale(1.05); }
        #sendBtn:active { transform: scale(.95); }
        #sendBtn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
        #sendBtn svg { width: 16px; height: 16px; fill: white; }
        .footer-note { text-align: center; font-size: 11px; color: #3a3a52; margin-top: 8px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-icon">🤖</div>
        <div class="header-text">
            <h1 id="botName">RAG Chatbot</h1>
            <p>Neuron AI · PHP · Knowledge Base</p>
        </div>
        <div class="status-dot" title="Online"></div>
    </div>

    <div class="messages" id="messages">
        <div class="welcome" id="welcome">
            <h2>Halo! 👋</h2>
            <p>Tanya apa saja seputar knowledge base yang sudah dimuat.</p>
            <div class="d-flex flex-wrap gap-2 justify-content-center mt-3">
                <button class="suggestion-btn" onclick="sendSuggestion(this)">Apa yang kamu ketahui?</button>
                <button class="suggestion-btn" onclick="sendSuggestion(this)">Ringkas informasi utama</button>
                <button class="suggestion-btn" onclick="sendSuggestion(this)">Jelaskan secara singkat</button>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="messageInput" placeholder="Tulis pesan kamu..." rows="1"
                onkeydown="handleKeydown(event)" oninput="autoResize(this)"></textarea>
            <button id="sendBtn" onclick="sendMessage()" title="Kirim">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
        <div class="footer-note">Powered by Neuron AI · PHP RAG</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const messagesEl = document.getElementById('messages');
    const inputEl    = document.getElementById('messageInput');
    const sendBtn    = document.getElementById('sendBtn');

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }
    function handleKeydown(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }
    function sendSuggestion(btn) { inputEl.value = btn.textContent; sendMessage(); }
    function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

    function appendMessage(role, content, isError = false) {
        const welcome = document.getElementById('welcome');
        if (welcome) welcome.style.display = 'none';
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.innerHTML = `
            <div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>
            <div class="${isError ? 'bubble error-bubble' : 'bubble'}">${formatMessage(content)}</div>
        `;
        messagesEl.appendChild(div);
        scrollToBottom();
    }

    function showTyping() {
        const div = document.createElement('div');
        div.className = 'message bot'; div.id = 'typing';
        div.innerHTML = `<div class="avatar">🤖</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
        messagesEl.appendChild(div); scrollToBottom();
    }
    function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

    function formatMessage(text) {
        return text
            .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
            .replace(/\*(.*?)\*/g,'<em>$1</em>')
            .replace(/`(.*?)`/g,'<code style="background:#0f0f18;padding:2px 5px;border-radius:4px;font-family:monospace;font-size:13px">$1</code>')
            .replace(/\n/g,'<br>');
    }

    async function sendMessage() {
        const message = inputEl.value.trim();
        if (!message) return;
        inputEl.value = ''; inputEl.style.height = 'auto';
        sendBtn.disabled = true;
        appendMessage('user', message);
        showTyping();
        try {
            const res  = await fetch('chat.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message }),
            });
            const data = await res.json();
            removeTyping();
            if (data.error) appendMessage('bot', '⚠️ ' + data.error, true);
            else appendMessage('bot', data.reply);
        } catch(e) {
            removeTyping();
            appendMessage('bot', '⚠️ Gagal terhubung ke server.', true);
        } finally {
            sendBtn.disabled = false;
            inputEl.focus();
        }
    }

    inputEl.focus();
</script>
</body>
</html>
